name: Security Review
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-22.04
    env:
      PYTHONPATH: src
      RUFF_VERSION: "0.15.0"
      PYTEST_VERSION: "8.4.2"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.lock.txt

      - name: Install Dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock.txt
          python -m pip install --disable-pip-version-check ruff==${RUFF_VERSION} pytest==${PYTEST_VERSION}

      - name: Lint
        run: ruff check src tests

      - name: Unit + Integration Tests
        run: python -m pytest tests/unit tests/integration -q

  build-provenance:
    name: Build + Provenance
    needs: [quality-gates]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set deterministic build timestamp
        id: source_date
        run: echo "source_date_epoch=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"

      - name: Build source bundle
        run: |
          set -euo pipefail
          SOURCE_DATE_EPOCH="${{ steps.source_date.outputs.source_date_epoch }}"
          mkdir -p dist
          tar --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime="@${SOURCE_DATE_EPOCH}" --clamp-mtime \
            -czf dist/omargate-action-src.tgz \
            action.yml Dockerfile entrypoint.sh requirements.lock.txt src prompts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Derive OCI image coordinates
        id: image_meta
        run: |
          set -euo pipefail
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_ref_tag="${image_name}:sha-${GITHUB_SHA}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "image_ref_tag=${image_ref_tag}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image with SBOM + provenance
        id: docker_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.image_meta.outputs.image_ref_tag }}
          provenance: mode=max
          sbom: true

      - name: Capture image metadata
        env:
          IMAGE_DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: |
          set -euo pipefail
          {
            echo "image_name=${{ steps.image_meta.outputs.image_name }}"
            echo "image_tag=sha-${{ github.sha }}"
            echo "image_digest=${IMAGE_DIGEST}"
            if [[ -n "${IMAGE_DIGEST}" ]]; then
              echo "image_ref=${{ steps.image_meta.outputs.image_name }}@${IMAGE_DIGEST}"
            else
              echo "image_ref="
            fi
          } > dist/build-metadata.txt

      - name: Attest source bundle provenance
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: dist/omargate-action-src.tgz

      - name: Attest Docker image provenance
        id: attest_image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.docker_build.outputs.digest != ''
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-name: ${{ steps.image_meta.outputs.image_name }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

      - name: Record image attestation metadata
        if: always() && steps.attest_image.outputs.attestation-url != ''
        run: |
          set -euo pipefail
          {
            echo "image_attestation_id=${{ steps.attest_image.outputs.attestation-id }}"
            echo "image_attestation_url=${{ steps.attest_image.outputs.attestation-url }}"
          } >> dist/build-metadata.txt

      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum * > SHA256SUMS
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-provenance-${{ github.run_id }}
          path: dist
          if-no-files-found: error

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install gitleaks
        run: |
          curl -fsSLo gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz
          echo "fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e  gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --source . \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            --no-git

      - name: Upload secret scan artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gitleaks-${{ github.run_id }}
          path: gitleaks-report.json
          if-no-files-found: warn

  omar-review:
    name: Omar Review
    needs: [quality-gates, build-provenance, secret-scanning]
    runs-on: ubuntu-22.04
    env:
      PYTHONPATH: src
      CODEX_CLI_VERSION: "0.98.0"
      CLAUDE_CLI_VERSION: "2.1.39"
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-provenance-${{ github.run_id }}
          path: .build-provenance

      - name: Verify build artifact checksums
        run: |
          set -euo pipefail
          cd .build-provenance
          sha256sum --check SHA256SUMS

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.lock.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock.txt

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Prepare global npm bin path
        run: |
          mkdir -p "$HOME/.npm-global/bin"
          npm config set prefix "$HOME/.npm-global"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Cache LLM CLI packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.npm
            ~/.npm-global
          key: ${{ runner.os }}-llm-cli-${{ env.CODEX_CLI_VERSION }}-${{ env.CLAUDE_CLI_VERSION }}
          restore-keys: |
            ${{ runner.os }}-llm-cli-

      - name: Install LLM CLIs
        shell: bash
        run: |
          set -euo pipefail

          verify_and_install_cli() {
            local package="$1"
            local version="$2"
            local expected_integrity=""
            local tmpdir=""
            local tarball=""
            local actual_integrity=""

            expected_integrity="$(npm view "${package}@${version}" dist.integrity --json | tr -d '"')"
            if [[ -z "${expected_integrity}" ]]; then
              echo "Unable to resolve integrity for ${package}@${version}" >&2
              return 1
            fi

            tmpdir="$(mktemp -d)"
            npm pack "${package}@${version}" --pack-destination "${tmpdir}" >/dev/null
            tarball="$(ls "${tmpdir}"/*.tgz)"
            actual_integrity="sha512-$(openssl dgst -sha512 -binary "${tarball}" | openssl base64 -A)"

            if [[ "${actual_integrity}" != "${expected_integrity}" ]]; then
              echo "Integrity mismatch for ${package}@${version}" >&2
              echo "expected=${expected_integrity} actual=${actual_integrity}" >&2
              return 1
            fi

            npm install -g "${tarball}"
            rm -rf "${tmpdir}"
          }

          install_pinned_cli() {
            local binary="$1"
            local package="$2"
            local version="$3"
            local current=""

            if command -v "${binary}" >/dev/null 2>&1; then
              current="$(${binary} --version 2>/dev/null || true)"
            fi

            if [[ -n "${current}" ]] && grep -Fq "${version}" <<<"${current}"; then
              echo "${binary} already cached (${current})"
              return 0
            fi

            echo "Installing ${package}@${version} with integrity verification"
            verify_and_install_cli "${package}" "${version}"
          }

          install_pinned_cli codex @openai/codex "${CODEX_CLI_VERSION}"
          install_pinned_cli claude @anthropic-ai/claude-code "${CLAUDE_CLI_VERSION}"

      - name: Verify LLM CLIs
        run: |
          set -euo pipefail
          echo "codex:  $(command -v codex)"
          echo "claude: $(command -v claude)"
          codex --version
          claude --version

      - name: Require OPENAI_API_KEY for Codex scan
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY is required so security-review runs with your Codex/OpenAI LLM path."
            exit 1
          fi

      - name: Omar Gate (Host Runner)
        id: omar
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_GITHUB_TOKEN: ${{ github.token }}
          INPUT_SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
          INPUT_SENTINELAYER_MANAGED_LLM: 'false'
          INPUT_LLM_PROVIDER: ${{ vars.OMAR_LLM_PROVIDER || 'openai' }}
          INPUT_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          INPUT_XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          INPUT_MODEL: ${{ vars.OMAR_MODEL || 'gpt-5.3-codex' }}
          INPUT_MODEL_FALLBACK: ${{ vars.OMAR_MODEL_FALLBACK || 'gpt-5.2-codex' }}
          INPUT_USE_CODEX: 'true'
          INPUT_CODEX_ONLY: 'true'
          INPUT_CODEX_MODEL: ${{ vars.OMAR_CODEX_MODEL || 'gpt-5.3-codex' }}
          INPUT_SEVERITY_GATE: P1
          INPUT_SCAN_MODE: deep
          INPUT_SHARE_METADATA: 'true'
        run: python -m omargate.main

      - name: Publish Codebase Snapshot Summary
        if: always() && steps.omar.outputs.codebase_ingest_summary_md_artifact != ''
        env:
          SNAPSHOT_SUMMARY_MD: ${{ steps.omar.outputs.codebase_ingest_summary_md_artifact }}
        run: |
          if [ -f "${SNAPSHOT_SUMMARY_MD}" ]; then
            cat "${SNAPSHOT_SUMMARY_MD}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Codebase snapshot summary not found at ${SNAPSHOT_SUMMARY_MD}" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload Omar Gate artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sentinelayer-${{ steps.omar.outputs.run_id }}
          path: .sentinelayer/runs/${{ steps.omar.outputs.run_id }}
          if-no-files-found: warn

  deploy:
    name: Deploy Artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality-gates, build-provenance, secret-scanning, omar-review]
    runs-on: ubuntu-22.04
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment:
      name: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-provenance-${{ github.run_id }}
          path: .build-provenance

      - name: Verify promoted artifact integrity
        id: verify_artifact
        run: |
          set -euo pipefail
          cd .build-provenance
          sha256sum --check SHA256SUMS
          test -s build-metadata.txt
          source build-metadata.txt
          test -n "${image_name:-}"
          test -n "${image_digest:-}"
          test -n "${image_ref:-}"
          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "image_digest=${image_digest}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"
          echo "Promotable artifact verified: ${image_ref}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Authenticate to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Verify container attestation before promotion
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ steps.verify_artifact.outputs.image_ref }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMAGE_REF}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/security-review.yml@refs/heads/main"

      - name: Promote immutable image to production tag
        env:
          IMAGE_NAME: ${{ steps.verify_artifact.outputs.image_name }}
          IMAGE_REF: ${{ steps.verify_artifact.outputs.image_ref }}
        run: |
          set -euo pipefail
          docker buildx imagetools create --tag "${IMAGE_NAME}:production" "${IMAGE_REF}"
          docker buildx imagetools inspect "${IMAGE_NAME}:production"
          echo "Promoted ${IMAGE_REF} -> ${IMAGE_NAME}:production" >> "${GITHUB_STEP_SUMMARY}"

  rollback-readiness:
    name: Rollback Readiness
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Verify rollback runbook checksum
        run: |
          set -euo pipefail
          cd docs
          sha256sum --check rollback-runbook.sha256

      - name: Run rollback drill on previous commit
        run: |
          set -euo pipefail
          rollback_target="$(git rev-parse HEAD~1)"
          rollback_worktree="$(mktemp -d)"
          cleanup() {
            git worktree remove --force "${rollback_worktree}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          git worktree add --detach "${rollback_worktree}" "${rollback_target}" >/dev/null
          python -m compileall -q "${rollback_worktree}/src"
          echo "Rollback drill passed for ${rollback_target}" >> "${GITHUB_STEP_SUMMARY}"
